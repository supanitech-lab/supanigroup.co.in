<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supani Technologies</title>
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
        }

        /* Tech-Infused Header Section */
        header {
            position: relative;
            background: #0f172a; /* Dark Tech Slate Base */
            /* Advanced CSS Grid Overlay Pattern */
            background-image: 
                linear-gradient(rgba(30, 41, 59, 0.8) 2px, transparent 2px),
                linear-gradient(90deg, rgba(30, 41, 59, 0.8) 2px, transparent 2px),
                radial-gradient(circle at 50% 50%, #1e40af 0%, #0f172a 100%);
            background-size: 40px 40px, 40px 40px, 100% 100%;
            background-position: center center;
            color: white;
            text-align: center;
            padding: 60px 20px 80px 20px;
            overflow: hidden;
            border-bottom: 3px solid #3b82f6;
        }

        /* Technical Glowing Accent Line */
        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #60a5fa, transparent);
            box-shadow: 0 0 15px #3b82f6;
        }

        .logo-container {
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }

        /* Crisp Blue SP Logo Box with Glow */
        .logo-box {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            width: 120px;
            height: 120px;
            margin: 0 auto;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.5);
            border: 2px solid #60a5fa;
        }

        .logo-sp {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .logo-text {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            margin-top: 6px;
            color: #93c5fd;
        }

        header h1 {
            font-size: 2.6rem;
            margin-bottom: 12px;
            letter-spacing: 2px;
            font-weight: 800;
            position: relative;
            z-index: 2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        header p {
            font-size: 1.05rem;
            color: #93c5fd;
            letter-spacing: 1px;
            font-weight: 500;
            position: relative;
            z-index: 2;
        }

        /* Services Grid Container */
        .container {
            max-width: 1200px;
            margin: -35px auto 40px auto;
            padding: 0 20px;
            position: relative;
            z-index: 3;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }
